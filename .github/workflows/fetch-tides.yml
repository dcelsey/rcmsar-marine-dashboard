name: fetch-tides
on:
  schedule:
    - cron: '31 */6 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-tides
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Fetch tide predictions
        run: node scripts/fetch-tides.mjs

      - name: Commit updated tides-map.json (if changed)
        run: |
          if [ -z "$(git status --porcelain public/data/tides-map.json)" ]; then
            echo "tides-map.json unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "wind-bot"
          git config user.email "wind-bot@users.noreply.github.com"
          git add public/data/tides-map.json
          git commit -m "chore(tides): refresh predictions [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $i) — rebasing and retrying..."
            git pull --rebase origin main
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
