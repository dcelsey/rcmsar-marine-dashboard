name: fetch-currents
on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-currents
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Fetch currents predictions
        run: node scripts/fetch-currents.mjs

      - name: Commit updated currents.json (if changed)
        run: |
          if [ -n "$(git status --porcelain public/data/currents.json)" ]; then
            git config user.name  "wind-bot"
            git config user.email "wind-bot@users.noreply.github.com"
            git add public/data/currents.json
            git commit -m "chore(currents): refresh predictions [skip ci]"
            git push
          else
            echo "currents.json unchanged — nothing to commit."
          fi
