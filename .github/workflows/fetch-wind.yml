name: fetch-wind
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: fetch-wind
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch wind observations
        run: node scripts/fetch-wind.mjs

      - name: Commit updated wind.json (if changed)
        run: |
          if [ -n "$(git status --porcelain public/data/wind.json)" ]; then
            git config user.name  "wind-bot"
            git config user.email "wind-bot@users.noreply.github.com"
            git add public/data/wind.json
            git commit -m "chore(wind): refresh live observations [skip ci]"
            git push
          else
            echo "wind.json unchanged — nothing to commit."
          fi
